# ========== SERVER ==========
server.port=${SERVER_PORT:4000}

# ========== POSTGRESQL ==========
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/aura_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

# ========== JPA / HIBERNATE ==========
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ========== MULTIPART ==========
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

# ========== JWT ==========
jwt.secret=${JWT_SECRET:changeme_jwt_secret_must_be_32_chars_min}
jwt.expiration=86400000

# ========== ADMIN CREDENTIALS ==========
admin.email=${ADMIN_EMAIL:admin@example.com}
admin.password=${ADMIN_PASSWORD:changeme}

# ========== CLOUDINARY (désactivé) ==========
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dummy}
cloudinary.api-key=${CLOUDINARY_API_KEY:dummy}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:dummy}

# ========== LOCAL UPLOADS ==========
upload.dir=${UPLOAD_DIR:./uploads}

# ========== CORS ==========
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

# ========== MAIL (Gmail SMTP) ==========
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:byaurardtw@gmail.com}
spring.mail.password=${MAIL_PASSWORD:changeme_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
mail.contact.recipient=${MAIL_CONTACT_RECIPIENT:byaurardtw@gmail.com}

# ========== ACTUATOR ==========
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=never