# ========== TEST CONFIG (H2 in-memory) ==========
spring.datasource.url=jdbc:h2:mem:auradb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

jwt.secret=test_jwt_secret_must_be_32_chars_min
jwt.expiration=86400000

admin.email=admin@example.com
admin.password=adminpass

cloudinary.cloud-name=dummy
cloudinary.api-key=dummy
cloudinary.api-secret=dummy

upload.dir=./uploads-test

cors.allowed-origins=http://localhost:5173,http://localhost:5174

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=test@example.com
spring.mail.password=testpassword
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
mail.contact.recipient=test@example.com

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
