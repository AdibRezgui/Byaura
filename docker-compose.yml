services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: aura_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aura_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '0.75'

  backend:
    build: ./backend
    restart: unless-stopped
    expose:
      - "4000"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/aura_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      UPLOAD_DIR: /uploads
      CORS_ALLOWED_ORIGINS: https://byaura.duckdns.org,https://byaura-admin.duckdns.org
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    volumes:
      - uploads:/uploads
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:4000/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aura_net
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '1.0'

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: ""
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - aura_net
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'

  admin:
    build:
      context: ./admin
      args:
        VITE_BACKEND_URL: ""
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - aura_net
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'

  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - admin
    networks:
      - aura_net
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'

volumes:
  postgres_data:
  uploads:
  caddy_data:
  caddy_config:

networks:
  aura_net:
    driver: bridge
