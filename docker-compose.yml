services:

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: aura_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aura_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    expose:
      - "4000"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/aura_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      UPLOAD_DIR: /uploads
      CORS_ALLOWED_ORIGINS: http://${VPS_IP},http://${VPS_IP}:8080
    volumes:
      - uploads:/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aura_net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: ""
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - aura_net

  admin:
    build:
      context: ./admin
      args:
        VITE_BACKEND_URL: ""
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - aura_net

volumes:
  postgres_data:
  uploads:

networks:
  aura_net:
    driver: bridge